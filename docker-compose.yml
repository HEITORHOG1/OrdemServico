services:
  # Análise Crítica (build, testes, cobertura, análise estática)
  analyze:
    build:
      context: .
      dockerfile: Dockerfile.analyze
    container_name: os_analyze
    profiles:
      - analyze

  # API .NET 9 (Minimal APIs)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: os_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=os_db;Uid=root;Pwd=root;
      - ConnectionStrings__RedisConnection=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=http://localhost:8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - os_network

  # Web Blazor (MVVM)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: os_web
    ports:
      - "8082:8080"
    environment:
      - Api__BaseUrl=http://api:8080
      - Api__ApiKey=
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - api
    networks:
      - os_network

  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: os_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=os_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - os_network

  # Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: os_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - os_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: os_db_manager
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=root
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - os_network

  # Seq (Log viewer — rodar com: docker-compose --profile monitoring up)
  seq:
    image: datalust/seq:latest
    container_name: os_seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:5341"
      - "8083:80"
    volumes:
      - seq_data:/data
    networks:
      - os_network
    profiles:
      - monitoring

volumes:
  mysql_data:
  redis_data:
  seq_data:

networks:
  os_network:
    driver: bridge
